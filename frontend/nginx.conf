# =============================================================================
# Nginx configuration for INACORTS frontend
# =============================================================================
# Serves the React SPA and proxies /api requests to the backend service.
# The backend service name "backend" is resolved via Docker Compose networking.
#
# Security:
#   • Swagger UI / ReDoc / OpenAPI proxy blocks are removed — these endpoints
#     are disabled in production (ENVIRONMENT=production) on the backend.
#   • Security headers prevent clickjacking, MIME sniffing, and XSS.
#   • Only /api and /health are proxied; all other paths serve the React SPA.
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"       always;
    add_header X-Content-Type-Options "nosniff"           always;
    add_header X-XSS-Protection       "1; mode=block"    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Gzip compression ────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    # ── Proxy: API requests → backend container ─────────────────────────
    # The backend is only reachable on the internal Docker network.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              backend;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Proxy: Health endpoint (internal monitoring only) ───────────────
    location = /health {
        proxy_pass       http://backend:8000;
        proxy_set_header Host backend;
    }

    # ── Block: Swagger UI, ReDoc, OpenAPI schema ────────────────────────
    # These are disabled in the backend in production mode.  The Nginx
    # rules below ensure a clean 404 even if someone tries the paths.
    location = /docs   { return 404; }
    location = /redoc  { return 404; }
    location = /openapi.json { return 404; }

    # ── Static assets — long cache ──────────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA fallback — all other routes serve index.html ────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
